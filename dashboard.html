<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting - CTU E-Clinic</title>
    <link rel="stylesheet" href="style.css?v=pro-dashboard-3" />
    <script>
        const role = sessionStorage.getItem('role');

        if (role === 'admin') {
            window.location.replace('admin-dashboard.html');
        } else if (role === 'student') {
            window.location.replace('student-dashboard.html');
        } else {
            window.location.replace('login.html');
        }
    </script>
</head>
<body>
    <main class="redirect-screen">
        <div class="redirect-card">
            <img src="CTU Logo (Cebu Technological University).jpg" alt="CTU Logo" />
            <p>Opening your CTU E-Clinic dashboard...</p>
        </div>
    </main>
</body>
</html>
